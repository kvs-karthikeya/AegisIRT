<div class="irt-adaptive-platform-v4" data-version="4.1.0" data-trial-phase="3">

  <!-- Authentication Module with MFA -->
  <div data-module="authentication" data-testid="auth-module-mfa">
    <div data-testid="login-form-wrapper" class="auth-container">
      <input
        data-testid="coordinator-username-field"
        data-action="input-coordinator-username"
        aria-label="Site Coordinator Username"
        autocomplete="username"
        class="form-control auth-field"
        type="text"
      />
      <input
        data-testid="coordinator-password-field"
        data-action="input-coordinator-password"
        aria-label="Site Coordinator Password"
        autocomplete="current-password"
        class="form-control auth-field"
        type="password"
      />
      <button
        data-testid="submit-login-mfa"
        data-action="initiate-mfa-login"
        aria-label="Sign In with MFA"
        class="btn btn-login-mfa"
      >Sign In</button>
    </div>
    <div data-testid="mfa-verification-panel" data-module="mfa" class="mfa-wrapper">
      <input
        data-testid="mfa-code-entry"
        data-action="input-mfa-code"
        aria-label="MFA Verification Code"
        maxlength="6"
        class="form-control mfa-input"
        type="text"
      />
      <button
        data-testid="submit-mfa-verification"
        data-action="verify-mfa-code"
        aria-label="Verify MFA Code"
        class="btn btn-mfa-verify"
      >Verify</button>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div data-testid="irt-main-dashboard" data-module="dashboard" class="dashboard-wrapper">
    
    <!-- Navigation -->
    <nav data-testid="primary-navigation" class="nav-container" aria-label="Primary Navigation">
      <button
        data-testid="nav-protocol-amendments"
        data-action="navigate-amendments"
        data-section="protocol-amendments"
        aria-label="Protocol Amendments"
        class="nav-item nav-amendments"
      >Protocol Amendments</button>
      <button
        data-testid="nav-patient-screening"
        data-action="navigate-screening"
        data-section="patient-screening"
        aria-label="New Patient Screening"
        class="nav-item nav-screening"
      >Patient Screening</button>
      <button
        data-testid="nav-randomization"
        data-action="navigate-randomization"
        data-section="randomization"
        aria-label="Randomization Module"
        class="nav-item nav-randomization"
      >Randomization</button>
      <button
        data-testid="nav-baseline-assessments"
        data-action="navigate-baseline"
        data-section="baseline-assessments"
        aria-label="Baseline Assessments"
        class="nav-item nav-baseline"
      >Baseline Assessments</button>
      <button
        data-testid="nav-emergency-procedures"
        data-action="navigate-emergency"
        data-section="emergency-procedures"
        aria-label="Emergency Procedures"
        class="nav-item nav-emergency"
      >Emergency Procedures</button>
      <button
        data-testid="nav-reports-audit"
        data-action="navigate-reports"
        data-section="reports-audit"
        aria-label="Reports and Audit Trail"
        class="nav-item nav-reports"
      >Reports and Audit</button>
    </nav>

    <!-- Protocol Amendments Module -->
    <div data-module="protocol-amendments" data-testid="amendments-module" class="amendments-container">
      <div data-testid="amendments-list-wrapper" class="amendments-list">
        <table data-testid="amendments-data-table" class="data-table">
          <tbody>
            <tr
              data-amendment-ref="AMD-2024-003"
              data-amendment-type="protocol"
              data-status="pending-acknowledgment"
              class="amendment-row"
            >
              <td>AMD-2024-003</td>
              <td>Stratified Block Randomization + High Dose Arm Addition</td>
              <td>
                <button
                  data-testid="review-amendment-action"
                  data-action="open-amendment-detail"
                  data-amendment-ref="AMD-2024-003"
                  aria-label="Review Amendment AMD-2024-003"
                  class="btn btn-review-amendment"
                >Review</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div data-testid="amendment-detail-view" data-module="amendment-detail" class="amendment-detail">
        <button
          data-testid="acknowledge-amendment-btn"
          data-action="acknowledge-amendment"
          aria-label="Acknowledge Protocol Amendment"
          class="btn btn-acknowledge"
        >Acknowledge</button>
        <button
          data-testid="confirm-acknowledgment-action"
          data-action="confirm-amendment-acknowledgment"
          aria-label="Confirm Acknowledgment"
          class="btn btn-confirm-ack"
        >Confirm Acknowledgment</button>
      </div>
    </div>

    <!-- Patient Screening Module -->
    <div data-module="patient-screening" data-testid="screening-module" class="screening-container">
      <form data-testid="patient-screening-form" class="screening-form">
        <input
          data-testid="patient-initials-input"
          data-action="input-patient-initials"
          name="patient_initials"
          aria-label="Patient Initials"
          class="form-control"
        />
        <input
          data-testid="patient-dob-input"
          data-action="input-patient-dob"
          name="patient_dob"
          aria-label="Date of Birth"
          class="form-control"
          type="date"
        />
        <input
          data-testid="screening-number-input"
          data-action="input-screening-number"
          name="screening_number"
          aria-label="Screening Number"
          class="form-control"
        />
        <input
          data-testid="hoehn-yahr-input"
          data-action="input-hoehn-yahr-score"
          aria-label="Hoehn and Yahr Scale Score"
          class="form-control clinical-score-input"
          type="number"
          step="0.5"
          min="0"
          max="5"
        />
        <input
          data-testid="updrs-total-score-input"
          data-action="input-updrs-score"
          aria-label="UPDRS Total Score"
          class="form-control updrs-input clinical-score-input"
          type="number"
        />
        <input
          data-testid="disease-duration-input"
          data-action="input-disease-duration"
          aria-label="Disease Duration in Years"
          class="form-control"
          type="number"
        />
        <button
          data-testid="execute-eligibility-check"
          data-action="run-eligibility-assessment"
          aria-label="Run Eligibility Check"
          class="btn btn-eligibility-check"
        >Check Eligibility</button>
      </form>
      <div data-testid="eligibility-result-wrapper" data-module="eligibility-result" class="eligibility-result">
        <div
          data-testid="eligibility-outcome-indicator"
          data-outcome="eligible"
          aria-label="Eligibility Outcome"
          class="outcome-indicator outcome-eligible"
        >ELIGIBLE</div>
        <button
          data-testid="confirm-screening-submission"
          data-action="submit-screening-confirmation"
          aria-label="Confirm Screening"
          class="btn btn-confirm-screening"
        >Confirm Screening</button>
      </div>
    </div>

    <!-- Stratified Randomization Module -->
    <div data-module="stratified-randomization" data-testid="randomization-module" class="randomization-container">
      <div data-testid="randomization-dashboard-view" class="rand-dashboard">
        <div data-testid="pending-randomizations-wrapper" class="pending-list">
          <table data-testid="pending-rand-table" class="data-table">
            <tbody>
              <tr
                data-screening-number="SCR-2024-0445"
                data-entity-type="pending-randomization"
                class="pending-rand-row"
              >
                <td>SCR-2024-0445</td>
                <td>J.D.</td>
                <td>
                  <button
                    data-testid="begin-randomization-action"
                    data-action="initiate-patient-randomization"
                    data-screening-ref="SCR-2024-0445"
                    aria-label="Begin Randomization for SCR-2024-0445"
                    class="btn btn-begin-randomization"
                  >Begin Randomization</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Stratified Randomization Dialog -->
      <div
        data-testid="stratified-randomization-dialog"
        data-module="stratification-form"
        role="dialog"
        aria-modal="true"
        aria-labelledby="strat-rand-title"
        class="modal-overlay strat-rand-modal"
      >
        <div class="modal-content">
          <h2 id="strat-rand-title">Stratified Block Randomization</h2>
          <select
            data-testid="disease-severity-stratum-select"
            data-action="select-severity-stratum"
            name="disease_severity_stratum"
            aria-label="Disease Severity Stratum"
            class="form-select stratum-select"
          >
            <option value="">Select severity...</option>
            <option value="mild">Mild (H&Y 1-2)</option>
            <option value="moderate">Moderate (H&Y 2.5-3)</option>
            <option value="severe">Severe (H&Y 4-5)</option>
          </select>
          <select
            data-testid="geographic-region-stratum-select"
            data-action="select-region-stratum"
            name="geographic_region_stratum"
            aria-label="Geographic Region Stratum"
            class="form-select stratum-select"
          >
            <option value="">Select region...</option>
            <option value="europe_western">Western Europe</option>
            <option value="europe_eastern">Eastern Europe</option>
            <option value="north_america">North America</option>
            <option value="asia_pacific">Asia Pacific</option>
          </select>
          <select
            data-testid="age-group-stratum-select"
            data-action="select-age-stratum"
            name="age_group_stratum"
            aria-label="Age Group Stratum"
            class="form-select stratum-select"
          >
            <option value="">Select age group...</option>
            <option value="under_55">Under 55</option>
            <option value="55_to_65">55 to 65</option>
            <option value="over_65">Over 65</option>
          </select>
          <button
            data-testid="submit-stratified-randomization"
            data-action="execute-stratified-randomization"
            aria-label="Execute Stratified Randomization"
            class="btn btn-execute-rand"
          >Execute Randomization</button>
        </div>
      </div>

      <div data-testid="randomization-outcome-panel" class="rand-result">
        <div
          data-testid="treatment-arm-assignment-display"
          data-module="arm-assignment"
          aria-label="Assigned Treatment Arm"
          class="arm-assignment-indicator"
        >Arm B — Low Dose 50mg</div>
        <button
          data-testid="confirm-randomization-outcome"
          data-action="confirm-arm-assignment"
          aria-label="Confirm Randomization Result"
          class="btn btn-confirm-rand-result"
        >Confirm Assignment</button>
      </div>
    </div>

    <!-- Kit Dispensing Module -->
    <div data-module="kit-dispensing" data-testid="kit-dispensing-module" class="dispensing-container">
      <button
        data-testid="auto-select-kit-action"
        data-action="auto-select-matched-kit"
        aria-label="Auto Select Stratification Matched Kit"
        class="btn btn-auto-kit"
      >Auto Select Kit</button>
      <div data-testid="kit-selection-result" data-module="kit-result" class="kit-result-panel">
        <div
          data-testid="selected-kit-number"
          data-module="kit-number-display"
          aria-label="Selected Kit Number"
          class="kit-number-display"
        >KIT-4821</div>
        <input
          data-testid="dispensing-verification-checkbox"
          data-action="verify-dispensing"
          aria-label="Verify Dispensing"
          class="form-check-input"
          type="checkbox"
        />
        <button
          data-testid="submit-dispensing-confirmation"
          data-action="confirm-drug-dispensing"
          aria-label="Confirm Drug Dispensing"
          class="btn btn-confirm-dispensing"
        >Confirm Dispensing</button>
      </div>
      <div
        data-testid="dispensing-success-banner"
        data-module="dispensing-success"
        role="alert"
        class="success-banner dispensing-success"
      >Drug kit successfully dispensed</div>
    </div>

    <!-- Baseline Assessments Module -->
    <div data-module="baseline-assessments" data-testid="baseline-module" class="baseline-container">
      <form data-testid="baseline-assessment-form" class="baseline-form">
        <input
          data-testid="updrs-part1-input"
          data-action="input-updrs-part1"
          name="updrs_part1_score"
          aria-label="UPDRS Part 1 Score"
          class="form-control updrs-part-input"
          type="number"
        />
        <input
          data-testid="updrs-part2-input"
          data-action="input-updrs-part2"
          name="updrs_part2_score"
          aria-label="UPDRS Part 2 Score"
          class="form-control updrs-part-input"
          type="number"
        />
        <input
          data-testid="updrs-part3-input"
          data-action="input-updrs-part3"
          name="updrs_part3_score"
          aria-label="UPDRS Part 3 Score"
          class="form-control updrs-part-input"
          type="number"
        />
        <input
          data-testid="updrs-part4-input"
          data-action="input-updrs-part4"
          name="updrs_part4_score"
          aria-label="UPDRS Part 4 Score"
          class="form-control updrs-part-input"
          type="number"
        />
        <input
          data-testid="tremor-assessment-input"
          data-action="input-tremor-score"
          aria-label="Tremor Assessment Score"
          class="form-control tremor-input"
          type="number"
        />
        <input
          data-testid="rigidity-score-input"
          data-action="input-rigidity-score"
          aria-label="Rigidity Score"
          class="form-control rigidity-input clinical-score-input"
          type="number"
        />
        <button
          data-testid="save-baseline-data"
          data-action="submit-baseline-assessments"
          aria-label="Save Baseline Assessments"
          class="btn btn-save-baseline"
        >Save Assessments</button>
      </form>
      <div
        data-testid="assessment-save-confirmation"
        data-module="save-confirmation"
        role="alert"
        class="confirmation-alert"
      >Baseline assessments saved successfully</div>
    </div>

    <!-- Emergency Unblinding Module -->
    <div data-module="emergency-procedures" data-testid="emergency-module" class="emergency-container">
      <button
        data-testid="initiate-emergency-unblinding"
        data-action="begin-unblinding-procedure"
        aria-label="Initiate Emergency Unblinding"
        class="btn btn-emergency-unblind"
      >Emergency Unblinding</button>
      <div
        data-testid="unblinding-authorization-dialog"
        data-module="unblinding-auth"
        role="dialog"
        aria-modal="true"
        class="modal-overlay unblinding-modal"
      >
        <div class="modal-content">
          <textarea
            data-testid="unblinding-reason-input"
            data-action="input-unblinding-reason"
            name="unblinding_reason"
            aria-label="Reason for Emergency Unblinding"
            class="form-control unblinding-textarea"
          ></textarea>
          <input
            data-testid="authorizing-physician-input"
            data-action="input-physician-name"
            name="authorizing_physician"
            aria-label="Authorizing Physician Name"
            class="form-control"
          />
          <input
            data-testid="physician-auth-code-input"
            data-action="input-physician-auth-code"
            aria-label="Physician Authorization Code"
            class="form-control auth-code-input"
          />
          <button
            data-testid="submit-unblinding-request"
            data-action="confirm-unblinding-submission"
            aria-label="Submit Unblinding Request"
            class="btn btn-submit-unblinding"
          >Submit Unblinding Request</button>
        </div>
      </div>
      <div
        data-testid="unblinding-result-container"
        data-module="unblinding-result"
        class="unblinding-result"
      >
        <div
          data-testid="revealed-treatment-assignment"
          data-module="treatment-reveal"
          aria-label="Revealed Treatment Assignment"
          class="treatment-reveal-display"
        >Arm B — Low Dose 50mg (Active)</div>
        <button
          data-testid="acknowledge-unblinding-result"
          data-action="acknowledge-unblinding"
          aria-label="Acknowledge Unblinding Result"
          class="btn btn-acknowledge-unblinding"
        >Acknowledge</button>
      </div>
    </div>

    <!-- Reports and Audit Trail Module -->
    <div data-module="reports-audit" data-testid="reports-module" class="reports-container">
      <div data-testid="reports-dashboard-view" class="reports-dashboard">
        <button
          data-testid="generate-audit-trail-action"
          data-action="begin-audit-trail-generation"
          aria-label="Generate GCP Audit Trail Report"
          class="btn btn-gen-audit"
        >Generate Audit Trail</button>
      </div>
      <div data-testid="audit-report-configuration" data-module="audit-config" class="audit-config-panel">
        <input
          data-testid="audit-date-from-input"
          data-action="set-audit-start-date"
          name="audit_date_from"
          aria-label="Audit Period Start Date"
          class="form-control date-input"
          type="date"
        />
        <input
          data-testid="audit-date-to-input"
          data-action="set-audit-end-date"
          name="audit_date_to"
          aria-label="Audit Period End Date"
          class="form-control date-input"
          type="date"
        />
        <select
          data-testid="audit-scope-select"
          data-action="select-audit-scope"
          name="audit_scope_selector"
          aria-label="Audit Scope"
          class="form-select"
        >
          <option value="">Select scope...</option>
          <option value="full_trial">Full Trial</option>
          <option value="site_specific">Site Specific</option>
          <option value="patient_specific">Patient Specific</option>
        </select>
        <input
          data-testid="include-unblinding-checkbox"
          data-action="toggle-unblinding-events"
          aria-label="Include Unblinding Events"
          class="form-check-input"
          type="checkbox"
        />
        <input
          data-testid="include-deviations-checkbox"
          data-action="toggle-protocol-deviations"
          aria-label="Include Protocol Deviations"
          class="form-check-input"
          type="checkbox"
        />
        <button
          data-testid="execute-audit-report-generation"
          data-action="generate-audit-report"
          aria-label="Generate Audit Report"
          class="btn btn-generate-audit"
        >Generate Report</button>
      </div>
      <div
        data-testid="audit-report-ready-notification"
        data-module="report-ready"
        role="alert"
        class="notification-banner report-ready"
      >Audit report generated successfully</div>
      <div class="report-download-actions">
        <button
          data-testid="download-audit-pdf-action"
          data-action="download-pdf-report"
          aria-label="Download Audit Report as PDF"
          class="btn btn-download-pdf"
        >Download PDF</button>
        <button
          data-testid="export-cfr-compliant-format"
          data-action="export-21cfr-format"
          aria-label="Export 21 CFR Part 11 Compliant Format"
          class="btn btn-cfr-export"
        >Export 21 CFR Format</button>
      </div>
    </div>

  </div>
</div>
